name: Post Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Push Latest Release Binaries
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set TAG_NAME in Environment
        # Subsequent jobs will be have the computed tag name
        run: echo "TAG_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Sync Go version from OPA
        run: |
          OPA_VERSION=$(go list -m -f '{{.Version}}' github.com/open-policy-agent/opa)
          curl -fsSL "https://raw.githubusercontent.com/open-policy-agent/opa/${OPA_VERSION}/.go-version" -o .go-version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version

      - name: Build Release Binaries
        run: make release

      - name: Create or Update Release
        env:
          # Required for the GitHub CLI
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build/github-release.sh --asset-dir=./_release/${TAG_NAME#v}/ --tag=${TAG_NAME}
